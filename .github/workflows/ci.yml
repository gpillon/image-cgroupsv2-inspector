name: CI

on:
  push:
    branches: [main, feature/quay-registry-scan, feature/jfrog-registry-scan]
  pull_request:
    branches: [main, feature/quay-registry-scan, feature/jfrog-registry-scan]

jobs:
  lint-test:
    uses: ./.github/workflows/lint-test.yml

  container-build:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4

      - name: Build container image
        run: docker build -t image-cgroupsv2-inspector -f Containerfile .

  binary-build-check:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Verify PyInstaller build
        run: |
          pyinstaller --onefile --name image-cgroupsv2-inspector-linux-amd64 \
            --add-data "src:src" \
            --hidden-import=src \
            image-cgroupsv2-inspector
          ./dist/image-cgroupsv2-inspector-linux-amd64 --help
